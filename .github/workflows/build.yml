name: Build ARM64

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ runner.os }}-arm64-toolchain
        restore-keys: apt-${{ runner.os }}-

    - name: Install toolchain
      run: |
        sudo apt update
        sudo apt install -y \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          musl-tools

    - name: Install Rust ARM64 musl target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-musl

    - name: Cache Rust registry & build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: rust-${{ runner.os }}-${{ hashFiles('Cargo.toml') }}-${{ hashFiles('src/search/main.rs') }}
        restore-keys: |
          rust-${{ runner.os }}-${{ hashFiles('Cargo.toml') }}-
          rust-${{ runner.os }}-

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << 'TOML'
        [target.aarch64-unknown-linux-musl]
        linker = "aarch64-linux-gnu-gcc"
        rustflags = ["-C", "target-feature=+crt-static"]
        TOML

    - name: Build C server
      run: |
        mkdir -p bin
        aarch64-linux-gnu-gcc -O3 -march=armv8-a+simd \
          -static -o bin/ai-server src/server/main.c -lpthread

    - name: Build Rust search
      run: |
        cargo build --release --target aarch64-unknown-linux-musl
        cp target/aarch64-unknown-linux-musl/release/search bin/search

    - name: Verify
      run: file bin/ai-server bin/search

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: ai-arm64-binaries
        path: bin/
        retention-days: 7
