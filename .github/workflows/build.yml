name: Build All Arch

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64    # ARM64 (Raspberry Pi 4, Orange Pi, dll)
            cc: aarch64-linux-gnu-gcc
            rust_target: aarch64-unknown-linux-musl
            pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

          - arch: armv7      # ARM32 (Raspberry Pi 2/3 lama)
            cc: arm-linux-gnueabihf-gcc
            rust_target: armv7-unknown-linux-musleabihf
            pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

          - arch: x86_64     # PC/Server/Cloud Shell
            cc: gcc
            rust_target: x86_64-unknown-linux-musl
            pkg: musl-tools

          - arch: riscv64    # RISC-V board
            cc: riscv64-linux-gnu-gcc
            rust_target: riscv64gc-unknown-linux-gnu
            pkg: gcc-riscv64-linux-gnu g++-riscv64-linux-gnu

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ matrix.arch }}

    - name: Install toolchain
      run: |
        sudo apt update -qq
        sudo apt install -y ${{ matrix.pkg }} musl-tools

    - name: Cache Rust
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: rust-${{ matrix.arch }}-${{ hashFiles('Cargo.toml','src/search/main.rs') }}
        restore-keys: rust-${{ matrix.arch }}-

    - name: Install Rust target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Configure Rust linker
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << TOML
        [target.${{ matrix.rust_target }}]
        linker = "${{ matrix.cc }}"
        rustflags = ["-C", "target-feature=+crt-static"]
        TOML

    - name: Build C server
      run: |
        mkdir -p bin
        ${{ matrix.cc }} -O3 -static \
          -o bin/ai-server src/server/main.c \
          -lpthread

    - name: Build Rust search
      run: |
        cargo build --release --target ${{ matrix.rust_target }}
        cp target/${{ matrix.rust_target }}/release/search bin/search

    - name: Verify
      run: file bin/ai-server bin/search

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: ai-${{ matrix.arch }}-binaries
        path: bin/
        retention-days: 7

  # Buat release dengan semua binary sekaligus
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4

    - name: Download semua artifact
      uses: actions/download-artifact@v4
      with:
        path: release/

    - name: Rename binary per arch
      run: |
        for arch in aarch64 armv7 x86_64 riscv64; do
          if [ -d "release/ai-${arch}-binaries" ]; then
            mv release/ai-${arch}-binaries/ai-server \
               release/ai-server-${arch}
            mv release/ai-${arch}-binaries/search \
               release/search-${arch}
          fi
        done
        ls -lh release/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/ai-server-*
          release/search-*
